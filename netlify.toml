[build]
  publish = "dist"
  command = "npm install && npm run build"

  [build.environment]
    NODE_VERSION  = "20"
    NODE_ENV      = "production"
    NPM_FLAGS     = "--include=dev"

# SPA routing — all paths serve index.html so React Router works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
